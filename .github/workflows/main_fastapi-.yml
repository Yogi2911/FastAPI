name: Build and deploy Python app to Azure Web App - FastAPI
 
on:

  push:

    branches:

      - main

  workflow_dispatch:
 
jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    permissions:

      id-token: write

      contents: read
 
    steps:

      - uses: actions/checkout@v4
 
      - name: Set up Python version

        uses: actions/setup-python@v5

        with:

          python-version: '3.11'
 
      - name: Install dependencies

        run: |

          python -m venv antenv

          source antenv/bin/activate

          pip install -r requirements.txt
 
      - name: Login to Azure

        uses: azure/login@v2

        with:

          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_800FD3A4C6FC4D5EA17E9BDDECEA3196 }}

          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_77A9CE9A6B83478F877F05C3904A9F8B }}

          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B8CCAD860C0A4250A6EFA63326952750 }}
 
      - name: Deploy to Azure Web App

        uses: azure/webapps-deploy@v3

        with:

          app-name: 'fastapi--ekdyb4epdxghemd0'   # ← fix this to your real app name

          slot-name: 'Production'

          package: .

          startup-command: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app'
 
